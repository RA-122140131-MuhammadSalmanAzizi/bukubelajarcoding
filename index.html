<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Buku Belajar Coding — belajar Python, JavaScript, C++, PHP, dan Go dalam Bahasa Indonesia. Web app responsif & bisa dipakai offline (PWA)." />
  <meta name="theme-color" content="#15607a" />
  <title>Buku Belajar Coding</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="aset/logo.png" />
  <link rel="apple-touch-icon" href="aset/logo.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <button id="menuBtn" class="icon-btn" aria-label="Buka menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
    </button>

    <a href="#" class="brand" id="brandHome" aria-label="Beranda">
      <span class="brand-mark" id="brandMark">
        <img src="aset/logo.png" alt="Logo Buku Belajar Coding" id="brandLogo" />
      </span>
      <span class="brand-text">Buku Belajar Coding</span>
    </a>

    <div class="topbar-actions">
      <button id="installBtn" class="pill-btn" hidden>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
        <span>Install</span>
      </button>
      <button id="themeBtn" class="icon-btn" aria-label="Ganti tema"></button>
    </div>
  </header>

  <div id="overlay" class="overlay" hidden></div>

  <div class="layout">
    <aside id="sidebar" class="sidebar">
      <div class="search-box">
        <span class="search-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </span>
        <input id="searchInput" type="search" placeholder="Cari pelajaran..." aria-label="Cari" />
      </div>

      <nav id="nav" class="nav"></nav>

      <div class="sidebar-footer">
        <button id="feedbackBtn" class="feedback-btn" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>
          <span>Kirim Masukan</span>
        </button>
      </div>
    </aside>

    <main class="content">
      <article id="article" class="article"></article>

      <nav class="pager">
        <button id="prevBtn" class="pager-btn" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
          <span>Sebelumnya</span>
        </button>
        <button id="nextBtn" class="pager-btn" hidden>
          <span>Selanjutnya</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
      </nav>

      <footer class="site-footer">
        <p>Ditulis oleh <strong>Muhammad Salman Azizi</strong></p>
      </footer>
    </main>
  </div>

  <!-- Modal Kirim Masukan -->
  <div id="feedbackModal" class="modal-backdrop" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="fbTitle">
      <div class="modal-head">
        <div>
          <h2 id="fbTitle">Kirim Masukan</h2>
          <p>Punya ide, koreksi, atau permintaan materi? Sampaikan ke pengembang.</p>
        </div>
        <button class="modal-close" id="feedbackClose" aria-label="Tutup">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <form id="feedbackForm">
          <div class="field">
            <label for="fbNama">Nama (opsional)</label>
            <input type="text" id="fbNama" placeholder="Namamu" />
          </div>
          <div class="field">
            <label for="fbPesan">Masukan</label>
            <textarea id="fbPesan" rows="4" placeholder="Tulis masukanmu di sini..." required></textarea>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn-ghost" id="feedbackCancel">Batal</button>
            <button type="submit" class="btn-primary">Kirim</button>
          </div>
          <p class="modal-note">Masukan akan dikirim ke email pengembang.</p>
        </form>
      </div>
    </div>
  </div>

  <script src="js/content-index.js"></script>
  <script src="js/markdown.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
